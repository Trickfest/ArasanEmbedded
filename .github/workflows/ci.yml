name: ArasanEmbedded CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: SwiftPM Package
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run complete package validation
        run: Scripts/validate.sh
